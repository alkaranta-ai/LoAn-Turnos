<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LoAn Estética | Panel</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--rose-deep:#3D0B1F;--rose-dark:#6B1535;--rose-mid:#A3284F;--rose-soft:#C9607E;--rose-pale:#E8A5B5;--rose-blush:#F5D5DF;--gold:#C8873A;--gold-light:#E8C078;--cream:#FFF8F5;--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);color:var(--rose-deep);background:radial-gradient(ellipse 80% 55% at 10% -5%,rgba(248,215,225,.5) 0%,transparent 65%),var(--rose-blush);min-height:100vh;padding:24px 16px 60px}
.wrap{max-width:960px;margin:0 auto}
/* --- Login --- */
#loginBox{max-width:360px;margin:14vh auto 0;background:rgba(255,255,255,.6);backdrop-filter:blur(40px) saturate(180%);border:.5px solid rgba(255,255,255,.8);border-radius:28px;padding:34px 28px;box-shadow:0 14px 40px rgba(163,40,79,.18);text-align:center}
#loginBox h1{font-family:var(--fd);font-style:italic;font-weight:400;font-size:1.6rem;margin-bottom:6px}
#loginBox p{font-size:.8rem;color:var(--rose-soft);margin-bottom:20px}
#passInput{width:100%;padding:14px 16px;border-radius:16px;border:.5px solid rgba(163,40,79,.25);background:rgba(255,255,255,.7);font-family:var(--fb);font-size:.95rem;color:var(--rose-deep);margin-bottom:12px;outline:none}
#passInput:focus{border-color:rgba(163,40,79,.5)}
#loginBtn{width:100%;padding:14px;border-radius:50px;border:none;background:linear-gradient(145deg,var(--rose-mid),var(--rose-dark));color:#fff;font-size:.88rem;font-weight:500;letter-spacing:.03em;box-shadow:0 8px 22px rgba(163,40,79,.32);cursor:pointer}
#loginErr{color:var(--rose-mid);font-size:.78rem;margin-top:12px;min-height:1em}
/* --- Panel --- */
#panel{display:none}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
header h1{font-family:var(--fd);font-style:italic;font-weight:400;font-size:1.7rem}
header .sub{font-size:.75rem;color:var(--rose-soft)}
#logoutBtn{background:rgba(255,255,255,.55);border:.5px solid rgba(163,40,79,.2);padding:9px 16px;border-radius:50px;font-size:.75rem;color:var(--rose-dark);cursor:pointer}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat{flex:1;min-width:120px;background:rgba(255,255,255,.55);backdrop-filter:blur(30px);border:.5px solid rgba(255,255,255,.8);border-radius:20px;padding:16px 18px}
.stat b{display:block;font-family:var(--fd);font-size:1.6rem;font-style:italic}
.stat span{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--rose-soft)}
.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px}
.tab{flex-shrink:0;padding:9px 18px;border-radius:50px;font-size:.78rem;font-weight:500;background:rgba(255,255,255,.5);border:.5px solid rgba(163,40,79,.15);color:var(--rose-dark);cursor:pointer;white-space:nowrap}
.tab.active{background:linear-gradient(145deg,var(--rose-mid),var(--rose-dark));color:#fff;border-color:transparent}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{padding:10px 14px;border-radius:14px;border:.5px solid rgba(163,40,79,.2);background:rgba(255,255,255,.6);font-family:var(--fb);font-size:.8rem;color:var(--rose-deep)}
.filters input{flex:1;min-width:160px}
#refreshBtn{padding:10px 16px;border-radius:14px;border:.5px solid rgba(163,40,79,.2);background:rgba(255,255,255,.6);font-size:.8rem;color:var(--rose-dark);cursor:pointer}
.list{display:flex;flex-direction:column;gap:10px}
.card{background:rgba(255,255,255,.55);backdrop-filter:blur(30px) saturate(160%);border:.5px solid rgba(255,255,255,.78);border-radius:20px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start}
.card .ic{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.05rem;background:linear-gradient(145deg,rgba(245,213,223,.9),rgba(255,255,255,.7))}
.card .body{flex:1;min-width:0}
.card .top{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.card .tipo{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--rose-soft);font-weight:600}
.card .fecha{font-size:.68rem;color:var(--rose-pale)}
.card .serv{font-family:var(--fd);font-style:italic;font-size:1.02rem;margin-bottom:2px}
.card .persona{font-size:.75rem;color:var(--rose-dark)}
.card .stars{color:var(--rose-soft);font-size:.85rem;letter-spacing:2px;margin-top:2px}
.card .coment{font-size:.8rem;font-style:italic;color:var(--rose-dark);margin-top:4px;line-height:1.5}
.empty{text-align:center;padding:60px 20px;color:var(--rose-pale);font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">

<div id="loginBox">
  <h1>LoAn Estética</h1>
  <p>Panel privado — ingresá la contraseña</p>
  <input type="password" id="passInput" placeholder="Contraseña" autocomplete="current-password">
  <button id="loginBtn">Ingresar</button>
  <div id="loginErr"></div>
</div>

<div id="panel">
  <header>
    <div><h1>Panel de pedidos</h1><div class="sub">LoAn Estética · Campana</div></div>
    <button id="logoutBtn">Cerrar sesión</button>
  </header>

  <div class="stats" id="stats"></div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tipo="todos">Todos</div>
    <div class="tab" data-tipo="disponibilidad">Turnos</div>
    <div class="tab" data-tipo="precio">Consultas</div>
    <div class="tab" data-tipo="resena">Reseñas</div>
    <div class="tab" data-tipo="sugerencia">Sugerencias</div>
  </div>

  <div class="filters">
    <input type="text" id="buscar" placeholder="Buscar por servicio, persona o comentario…">
    <select id="filtroServicio"><option value="">Todos los tratamientos</option></select>
    <button id="refreshBtn">↻ Actualizar</button>
  </div>

  <div class="list" id="lista"></div>
</div>

</div>

<script>
// ⚠️ PEGÁ ACÁ LA URL DE TU APPS SCRIPT (Implementar > Nueva implementación)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxE2-2rYznw1NmmFaCLJixiNiDwtriqo5kP9kPxY5sFtut9eZnpjFYJP39W3Hf2HmZ-/exec";

const IC = { precio:'💬', disponibilidad:'📅', resena:'⭐', sugerencia:'📝' };
const TY = { precio:'Consulta', disponibilidad:'Turno', resena:'Reseña', sugerencia:'Sugerencia' };

let TODOS = [];
let tipoActivo = 'todos';

function guardarPass(p){ sessionStorage.setItem('loan_admin_pass', p); }
function getPass(){ return sessionStorage.getItem('loan_admin_pass') || ''; }

async function intentarLogin(pass){
  const errEl = document.getElementById('loginErr');
  errEl.textContent = 'Verificando…';
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?pass=' + encodeURIComponent(pass));
    const data = await res.json();
    if(data && data.error){
      errEl.textContent = 'Contraseña incorrecta.';
      return;
    }
    guardarPass(pass);
    TODOS = Array.isArray(data) ? data : [];
    mostrarPanel();
  }catch(e){
    errEl.textContent = 'No se pudo conectar. Revisá la URL del Apps Script.';
  }
}

document.getElementById('loginBtn').addEventListener('click', () => {
  const p = document.getElementById('passInput').value.trim();
  if(p) intentarLogin(p);
});
document.getElementById('passInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('loan_admin_pass');
  location.reload();
});
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const data = await cargarDatos();
  TODOS = data;
  render();
});

async function cargarDatos(){
  const res = await fetch(APPS_SCRIPT_URL + '?pass=' + encodeURIComponent(getPass()));
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

function mostrarPanel(){
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  render();
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    tipoActivo = t.getAttribute('data-tipo');
    render();
  });
});
document.getElementById('buscar').addEventListener('input', render);
document.getElementById('filtroServicio').addEventListener('change', render);

function poblarServicios(){
  const sel = document.getElementById('filtroServicio');
  const actuales = new Set(Array.from(sel.options).map(o => o.value));
  const servicios = [...new Set(TODOS.map(x => x.Servicio).filter(Boolean))].sort();
  servicios.forEach(s => {
    if(!actuales.has(s)){
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sel.appendChild(o);
    }
  });
}

function render(){
  poblarServicios();

  const q = document.getElementById('buscar').value.trim().toLowerCase();
  const servF = document.getElementById('filtroServicio').value;

  let filtrado = TODOS.filter(x => {
    if(tipoActivo !== 'todos' && x.Tipo !== tipoActivo) return false;
    if(servF && x.Servicio !== servF) return false;
    if(q){
      const blob = [x.Servicio, x.Persona, x.Comentario].join(' ').toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });

  // Stats
  const stats = document.getElementById('stats');
  const total = TODOS.length;
  const turnos = TODOS.filter(x => x.Tipo === 'disponibilidad').length;
  const consultas = TODOS.filter(x => x.Tipo === 'precio').length;
  const resenas = TODOS.filter(x => x.Tipo === 'resena').length;
  stats.innerHTML = `
    <div class="stat"><b>${total}</b><span>Total</span></div>
    <div class="stat"><b>${turnos}</b><span>Turnos</span></div>
    <div class="stat"><b>${consultas}</b><span>Consultas</span></div>
    <div class="stat"><b>${resenas}</b><span>Reseñas</span></div>
  `;

  const lista = document.getElementById('lista');
  if(!filtrado.length){
    lista.innerHTML = '<div class="empty">No hay pedidos para este filtro.</div>';
    return;
  }
  lista.innerHTML = filtrado.map(x => {
    const estrellas = x.Estrellas ? '★'.repeat(Number(x.Estrellas)) + '☆'.repeat(5-Number(x.Estrellas)) : '';
    return `<div class="card">
      <div class="ic">${IC[x.Tipo] || '📋'}</div>
      <div class="body">
        <div class="top"><span class="tipo">${TY[x.Tipo] || x.Tipo || ''}</span><span class="fecha">${x.Fecha || ''}</span></div>
        <div class="serv">${x.Servicio || '—'}</div>
        ${x.Persona ? `<div class="persona">Atendido por: ${x.Persona}</div>` : ''}
        ${estrellas ? `<div class="stars">${estrellas}</div>` : ''}
        ${x.Comentario ? `<div class="coment">"${x.Comentario}"</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Si ya había sesión iniciada en este navegador, entra directo
(function(){
  const p = getPass();
  if(p) intentarLogin(p);
})();
</script>
</body>
</html>
