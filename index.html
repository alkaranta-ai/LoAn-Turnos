<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LoAn Estética | Turnos online — Campana</title>
<meta name="description" content="Reservá tu turno online en LoAn Estética, Campana. Tratamientos faciales, corporales y masajes.">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LoAn">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta — blanco con acentos rosa para Liquid Glass estilo Apple */
  --r9: #2A0E1B;
  --r8: #4A1530;
  --r7: #8A2050;
  --r6: #B8285E;
  --r5: #D4547A;
  --r4: #E07A97;
  --r3: #ECA3B8;
  --r2: #F5CCDA;
  --r1: #FAE0EB;
  --r0: #FEF6F9;
  --bg: #FFFFFF;
  --gold: #C9894A;
  --gold2: #F0C070;
  --text: #111111;
  --textm: #3A3A3A;
  --textl: #8A8A8A;
  --white: #fff;
  --r: 24px;
  --fd: 'Cormorant Garamond', Georgia, serif;
  --fb: 'Inter', system-ui, sans-serif;
  --nav-h: 76px;

  /* Pink glass tokens (estado activo / "tocado") */
  --pink-glass-bg: rgba(255, 200, 222, 0.42);
  --pink-glass-border: rgba(255, 255, 255, 0.75);
  --pink-glass-shadow: 0 8px 28px rgba(212, 84, 122, 0.30);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
button, a { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; outline: none; cursor: pointer; font-family: var(--fb); }
button:focus, button:focus-visible, a:focus { outline: none; }

html, body { height: 100%; background: var(--bg); }
body { font-family: var(--fb); color: var(--text); min-height: 100dvh; overflow: hidden; }

/* ── FONDO BLANCO con leves toques de luz (sin saturar de color) ── */
#bgAnchor {
  position: fixed; inset: 0; z-index: -10;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(255,210,228,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 95% 85%,   rgba(255,225,235,0.30) 0%, transparent 55%),
    radial-gradient(ellipse 60% 35% at 50% 110%,  rgba(240,192,112,0.10) 0%, transparent 60%),
    var(--bg);
}

/* ── APP ── */
#app { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; background: transparent; }

/* ── PÁGINAS ── */
.page {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform 0.46s cubic-bezier(0.4,0,0.2,1), opacity 0.46s ease;
  will-change: transform, opacity;
  background: transparent;
}
.page.out-left  { transform: translateX(-18%) scale(0.93); opacity: 0; pointer-events: none; }
.page.out-right { transform: translateX(100%); opacity: 0; pointer-events: none; }

/* ── SCROLL ── */
.scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── HEADER — liquid glass blanco ── */
header.top {
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
  padding-top: calc(16px + env(safe-area-inset-top));
  padding-bottom: 16px;
  padding-left:  max(22px, env(safe-area-inset-left));
  padding-right: max(22px, env(safe-area-inset-right));
  display: flex; align-items: center; justify-content: center;
  /* Liquid glass blanco-translúcido, más pronunciado */
  background: rgba(255, 255, 255, 0.40);
  backdrop-filter: blur(60px) saturate(220%) brightness(1.10) contrast(1.03);
  -webkit-backdrop-filter: blur(60px) saturate(220%) brightness(1.10) contrast(1.03);
  border-bottom: 1px solid rgba(255,255,255,0.85);
  box-shadow:
    inset 0 2px 1px rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(200,160,180,0.12),
    0 8px 28px rgba(180,80,120,0.12);
}
header.top.with-back { justify-content: flex-start; gap: 12px; }

/* Reflejo superior del glass */
header.top::after {
  content: "";
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.90), transparent);
  pointer-events: none;
}

.brand { display: flex; align-items: center; gap: 12px; }
.brand .mark {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(145deg, var(--r4) 0%, var(--r7) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: var(--fd); font-size: 1.25rem; font-weight: 600;
  box-shadow:
    0 4px 12px rgba(212,84,122,0.35),
    inset 0 1.5px 0 rgba(255,255,255,0.45),
    inset 0 -1px 0 rgba(120,30,60,0.18);
  flex-shrink: 0;
}
.brand .name {
  font-family: var(--fd); font-size: 1.5rem; font-weight: 600;
  color: var(--r9); letter-spacing: 0.01em;
}

.back-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; color: var(--r7);
  font-size: 0.96rem; font-weight: 500; padding: 8px 12px;
  border-radius: 50px;
  transition: background 0.15s, box-shadow 0.15s;
}
.back-btn svg { width: 18px; height: 18px; }
.back-btn:active {
  background: var(--pink-glass-bg);
  backdrop-filter: blur(20px) saturate(220%);
  -webkit-backdrop-filter: blur(20px) saturate(220%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), var(--pink-glass-shadow);
}

/* ── SECTION HEAD ── */
.section-head { text-align: center; padding: 28px 20px 20px; }
.section-head h2 {
  font-family: var(--fd); font-size: 2.1rem; font-weight: 600;
  color: var(--r9); margin-bottom: 5px; letter-spacing: 0.01em;
}
.section-head p { color: var(--textl); font-size: 0.83rem; letter-spacing: 0.02em; }

/* ════════════════════════════════════════════
   TARJETAS DE SERVICIOS — Liquid Glass blanco
   Scroll normal (con scroll-snap) en vez de
   apilado sticky: cada tarjeta se desliza
   suavemente y queda "enganchada" al centrarse
   ════════════════════════════════════════════ */
.services-grid {
  display: flex; flex-direction: column; gap: 16px;
  padding: 4px 16px 24px;
  scroll-snap-type: y mandatory;
}
.services-grid::-webkit-scrollbar { display: none; }

.service-card {
  border-radius: var(--r);
  overflow: hidden;
  height: calc(100dvh - var(--nav-h) - 168px);
  min-height: 320px;
  max-height: 560px;
  flex: 0 0 auto;
  cursor: pointer;
  transition: transform 0.16s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.16s ease, background 0.16s ease;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 26px;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;

  /* Liquid Glass — más pronunciado: más blur, más saturación, más brillo de borde */
  background: rgba(255, 255, 255, 0.38);
  backdrop-filter: blur(60px) saturate(220%) brightness(1.12) contrast(1.04);
  -webkit-backdrop-filter: blur(60px) saturate(220%) brightness(1.12) contrast(1.04);
  border: 1px solid rgba(255,255,255,0.85);
  box-shadow:
    inset 0 2px 1px rgba(255,255,255,0.95),
    inset 0 -2px 12px rgba(255,255,255,0.55),
    inset 0 0 0 1px rgba(255,255,255,0.30),
    0 14px 38px rgba(180,80,120,0.20),
    0 4px 12px rgba(180,80,120,0.14);
  will-change: transform;
}
.service-card:active {
  transform: scale(0.96);
  /* Tinte rosa al tocar, efecto liquid glass más intenso */
  background: var(--pink-glass-bg);
  backdrop-filter: blur(60px) saturate(260%) brightness(1.10);
  -webkit-backdrop-filter: blur(60px) saturate(260%) brightness(1.10);
  border-color: var(--pink-glass-border);
  box-shadow:
    inset 0 2px 1px rgba(255,255,255,0.95),
    inset 0 -2px 14px rgba(255,200,222,0.65),
    0 10px 30px rgba(212,84,122,0.38);
}

/* Capa de color de fondo suave, único por tarjeta, detrás de la imagen */
.service-card .card-bg {
  position: absolute; inset: 0; z-index: -1;
}
.card-bg-1 { background: linear-gradient(160deg, #FFEFF4 0%, #FFFFFF 70%); }
.card-bg-2 { background: linear-gradient(160deg, #FFF1F0 0%, #FFFFFF 70%); }
.card-bg-3 { background: linear-gradient(160deg, #FDEFFA 0%, #FFFFFF 70%); }
.card-bg-4 { background: linear-gradient(160deg, #FFF0F6 0%, #FFFFFF 70%); }
.card-bg-5 { background: linear-gradient(160deg, #FFF3EE 0%, #FFFFFF 70%); }
.service-card .card-image {
  position: absolute; inset: 0; z-index: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.service-card .card-image svg {
  width: 62%; height: 62%; max-width: 220px;
  opacity: 0.9;
}

/* Overlay degradado solo en la franja inferior, para que el texto en negro
   tenga un fondo claro y legible sin tapar la imagen */
.service-card .card-overlay {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
  height: 42%;
  background: linear-gradient(
    to top,
    rgba(255,255,255,0.78) 0%,
    rgba(255,255,255,0.55) 55%,
    transparent 100%
  );
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

/* Línea dorada superior — firma de lujo */
.service-card::before {
  content: "";
  position: absolute; top: 0; left: 18%; right: 18%; height: 1px; z-index: 5;
  background: linear-gradient(
    90deg, transparent,
    rgba(240,192,112,0.85), rgba(255,255,255,0.80),
    rgba(240,192,112,0.85), transparent
  );
}
/* Reflejo glass en el borde superior */
.service-card::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 50%; z-index: 3;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.55) 0%,
    rgba(255,255,255,0.10) 50%,
    transparent 100%
  );
  pointer-events: none; border-radius: var(--r) var(--r) 0 0;
}

.service-card .card-body { position: relative; z-index: 4; }
.service-card h3 {
  font-family: var(--fd); font-size: 1.85rem; font-weight: 600;
  color: #111111; margin-bottom: 14px;
  letter-spacing: 0.01em; line-height: 1.15;
}
.service-card .card-meta { display: flex; align-items: center; justify-content: space-between; }
.service-card .dur { font-size: 0.88rem; color: #333333; letter-spacing: 0.04em; }
.service-card .price-pill {
  /* Pill en glass rosa suave, texto negro para que se lea bien */
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  border: 0.5px solid rgba(212,84,122,0.30);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 2px 8px rgba(180,80,120,0.10);
  border-radius: 50px; padding: 7px 18px;
  font-size: 0.92rem; font-weight: 700; color: #111111; letter-spacing: 0.02em;
}

/* Animación entrada */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1);    }
}

/* ── RESEÑAS ── */
.review-page-content {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 20px 0; gap: 24px;
}
.review-tagline { text-align: center; }
.review-tagline h2 {
  font-family: var(--fd); font-size: 2.1rem; font-weight: 600;
  color: var(--r9); margin-bottom: 5px; letter-spacing: 0.01em;
}
.review-tagline p { font-size: 0.83rem; color: var(--textl); }

.review-card {
  width: 100%;
  /* Liquid glass blanco */
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(40px) saturate(160%) brightness(1.05);
  -webkit-backdrop-filter: blur(40px) saturate(160%) brightness(1.05);
  border: 0.5px solid rgba(255,255,255,0.80);
  border-radius: var(--r); padding: 30px 24px;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.90),
    0 8px 28px rgba(180,80,120,0.12),
    0 2px 8px rgba(180,80,120,0.08);
  text-align: center;
}

.stars-row {
  display: flex; justify-content: center; gap: 10px;
  font-size: 2.5rem; margin-bottom: 14px; user-select: none;
}
.stars-row span {
  display: inline-block;
  color: rgba(180,180,180,0.35);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), color 0.15s;
  cursor: pointer; line-height: 1;
}
.stars-row span.lit  { color: var(--r5); }
.stars-row span.bump { transform: scale(1.25); }

.star-label {
  font-family: var(--fd); font-size: 1.5rem; font-weight: 500;
  color: var(--r7); min-height: 2.1rem; margin-bottom: 4px; letter-spacing: 0.01em;
}
.review-hint { font-size: 0.79rem; color: var(--textl); margin-bottom: 22px; }

/* ── BOTÓN PRINCIPAL — liquid glass rosa al tocar ── */
.btn-glass {
  width: 100%; padding: 15px; border-radius: 50px; border: none;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 0.5px solid rgba(212,84,122,0.35);
  color: var(--r7);
  font-family: var(--fb); font-size: 0.90rem; font-weight: 600; letter-spacing: 0.04em;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.85),
    0 6px 20px rgba(180,80,120,0.14);
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  overflow: hidden;
}
.btn-glass:active {
  transform: scale(0.97);
  background: var(--pink-glass-bg);
  color: var(--r9);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.85), var(--pink-glass-shadow);
}

/* ── HISTORIAL ── */
.historial-list { display: flex; flex-direction: column; gap: 10px; padding: 0 4px; }

.hist-card {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(32px) saturate(160%);
  -webkit-backdrop-filter: blur(32px) saturate(160%);
  border: 0.5px solid rgba(255,255,255,0.75);
  border-radius: 20px; padding: 15px 17px;
  display: flex; gap: 13px; align-items: flex-start;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.85),
    0 4px 16px rgba(180,80,120,0.10);
}
.hist-icon {
  width: 40px; height: 40px; border-radius: 13px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1.15rem;
  background: linear-gradient(145deg, rgba(255,225,235,0.90), rgba(255,255,255,0.70));
  border: 0.5px solid rgba(255,255,255,0.70);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
}
.hist-body { flex: 1; min-width: 0; }
.hist-tipo { font-size: 0.63rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--r6); margin-bottom: 2px; }
.hist-servicio { font-family: var(--fd); font-size: 1.02rem; color: #111111; margin-bottom: 3px; line-height: 1.2; font-weight: 600; }
.hist-stars { font-size: 0.84rem; color: var(--r5); margin-bottom: 2px; letter-spacing: 3px; }
.hist-comentario { font-size: 0.79rem; color: var(--textm); font-style: italic; margin-bottom: 3px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-fecha { font-size: 0.67rem; color: var(--textl); }

.hist-empty {
  text-align: center; padding: 50px 20px;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 0.5px solid rgba(255,255,255,0.65);
  border-radius: var(--r);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.80);
}
.hist-empty .empty-icon { font-size: 2.6rem; margin-bottom: 12px; opacity: 0.55; }
.hist-empty p { color: var(--textl); font-size: 0.86rem; line-height: 1.65; }

.hist-clear {
  margin-top: 14px; width: 100%; padding: 12px; border-radius: 50px;
  border: 0.5px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: var(--textl); font-family: var(--fb); font-size: 0.81rem; cursor: pointer;
  transition: background 0.15s; overflow: hidden;
}
.hist-clear:active { background: var(--pink-glass-bg); color: var(--r9); }

/* ════════════════════════════════════════════
   NAV BOTTOM — liquid glass blanco, activo en rosa
   ════════════════════════════════════════════ */
nav.bottom {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
  background: rgba(255, 255, 255, 0.48);
  backdrop-filter: blur(60px) saturate(220%) brightness(1.10) contrast(1.03);
  -webkit-backdrop-filter: blur(60px) saturate(220%) brightness(1.10) contrast(1.03);
  border-top: 1px solid rgba(255,255,255,0.85);
  box-shadow:
    inset 0 2px 1px rgba(255,255,255,0.95),
    0 -8px 28px rgba(180,80,120,0.12);
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0 max(env(safe-area-inset-bottom), 12px);
}
/* Cierre safe-area: color sólido = sin franja */
nav.bottom::after {
  content: "";
  position: fixed; left: 0; right: 0;
  bottom: calc(-1 * max(env(safe-area-inset-bottom), 12px));
  height: calc(max(env(safe-area-inset-bottom), 12px) + 2px);
  background: #FFFFFF;
  z-index: -1;
}
nav.bottom button {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none;
  color: var(--textm); font-size: 0.61rem; font-family: var(--fb);
  font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 6px 16px 5px; border-radius: 18px;
  transition: color 0.18s, background 0.18s, box-shadow 0.18s;
  overflow: hidden; isolation: isolate;
}
nav.bottom button svg { width: 22px; height: 22px; transition: transform 0.2s; }
nav.bottom button.active {
  color: var(--r9);
  /* Tinte rosa liquid glass para el ítem activo */
  background: var(--pink-glass-bg);
  backdrop-filter: blur(20px) saturate(220%);
  -webkit-backdrop-filter: blur(20px) saturate(220%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), var(--pink-glass-shadow);
}
nav.bottom button.active svg { transform: scale(1.10); }
nav.bottom button:active {
  background: var(--pink-glass-bg);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), var(--pink-glass-shadow);
}
nav.bottom button:focus, nav.bottom button:focus-visible { outline: none; }

/* ── MODALES ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(60, 40, 50, 0.28);
  backdrop-filter: blur(10px) saturate(140%);
  -webkit-backdrop-filter: blur(10px) saturate(140%);
  z-index: 100; align-items: flex-end; justify-content: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-overlay.flex { display: flex; }

.modal-sheet {
  background: rgba(255, 255, 255, 0.62);
  backdrop-filter: blur(70px) saturate(220%) brightness(1.10) contrast(1.03);
  -webkit-backdrop-filter: blur(70px) saturate(220%) brightness(1.10) contrast(1.03);
  border: 1px solid rgba(255,255,255,0.90);
  box-shadow:
    inset 0 2px 1px rgba(255,255,255,0.98),
    inset 0 -2px 16px rgba(255,255,255,0.50),
    0 -10px 56px rgba(180,80,120,0.20);
  border-radius: 30px 30px 0 0;
  width: 100%; max-width: 520px; padding: 8px 20px 30px;
  animation: sheetUp 0.34s cubic-bezier(0.34,1.05,0.64,1);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle { width: 34px; height: 4px; background: rgba(180,80,120,0.22); border-radius: 2px; margin: 0 auto 18px; }
.modal-sheet h3 {
  font-family: var(--fd); color: var(--r9); font-size: 1.5rem; font-weight: 600;
  margin-bottom: 16px; text-align: center; letter-spacing: 0.01em;
}

.modal-btn {
  width: 100%; margin-bottom: 9px; padding: 15px 17px; border-radius: 18px;
  border: 0.5px solid rgba(255,255,255,0.70);
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  color: #111111;
  font-family: var(--fb); font-size: 0.90rem; font-weight: 500;
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.85), 0 2px 10px rgba(180,80,120,0.08);
  transition: transform 0.12s, background 0.12s, box-shadow 0.12s;
  text-align: left; display: flex; align-items: center; gap: 13px; overflow: hidden;
}
.modal-btn:active {
  transform: scale(0.98);
  background: var(--pink-glass-bg);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.85), var(--pink-glass-shadow);
}
.modal-btn .btn-label strong { display: block; font-size: 0.89rem; color: #111111; font-weight: 700; margin-bottom: 1px; }
.modal-btn .btn-label span   { font-size: 0.75rem; color: var(--textm); font-weight: 400; }
.modal-btn-icon { font-size: 1.3rem; flex-shrink: 0; }

.modal-btn-cancel {
  width: 100%; padding: 14px; border-radius: 50px; margin-top: 2px; margin-bottom: 0;
  border: 0.5px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: var(--textl); font-family: var(--fb); font-size: 0.87rem; font-weight: 500;
  transition: background 0.12s; overflow: hidden;
}
.modal-btn-cancel:active { background: var(--pink-glass-bg); color: var(--r9); }

/* ── MODAL FLOTANTE ── */
.modal-float-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(60,40,50,0.28);
  backdrop-filter: blur(10px) saturate(140%);
  -webkit-backdrop-filter: blur(10px) saturate(140%);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.modal-float-overlay.flex { display: flex; }

.modal-float {
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(70px) saturate(220%) brightness(1.10) contrast(1.03);
  -webkit-backdrop-filter: blur(70px) saturate(220%) brightness(1.10) contrast(1.03);
  border: 1px solid rgba(255,255,255,0.90);
  box-shadow: inset 0 2px 1px rgba(255,255,255,0.98), inset 0 -2px 16px rgba(255,255,255,0.50), 0 28px 70px rgba(180,80,120,0.24);
  border-radius: 28px; width: 100%; max-width: 420px; padding: 28px 22px;
  animation: floatIn 0.32s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes floatIn {
  from { transform: scale(0.90) translateY(16px); opacity: 0; }
  to   { transform: scale(1)    translateY(0);    opacity: 1; }
}
.modal-float h3 {
  font-family: var(--fd); color: var(--r9); font-size: 1.5rem; font-weight: 600;
  text-align: center; margin-bottom: 4px; letter-spacing: 0.01em;
}
.modal-stars-display { font-size: 1.35rem; text-align: center; color: var(--r5); letter-spacing: 4px; margin-bottom: 18px; }

.comment-input {
  width: 100%; padding: 14px 16px; border-radius: 16px;
  border: 0.5px solid rgba(212,84,122,0.25);
  background: rgba(255,255,255,0.60);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  font-family: var(--fb); font-size: 0.87rem; color: #111111;
  resize: none; outline: none; min-height: 104px; margin-bottom: 14px;
  transition: border-color 0.2s, background 0.2s;
  box-shadow: inset 0 1px 4px rgba(180,80,120,0.06);
}
.comment-input:focus { border-color: rgba(212,84,122,0.55); background: rgba(255,235,242,0.55); }
.comment-input::placeholder { color: var(--textl); }

.btn-cancel-flat {
  width: 100%; padding: 12px; border-radius: 50px; margin-top: 8px;
  border: 0.5px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.45);
  color: var(--textl); font-family: var(--fb); font-size: 0.85rem; font-weight: 500;
  transition: background 0.12s; overflow: hidden;
}
.btn-cancel-flat:active { background: var(--pink-glass-bg); color: var(--r9); }
</style>
</head>
<body>

<div id="bgAnchor"></div>

<div id="app">

  <!-- ══ PÁGINA 1: SERVICIOS ══ -->
  <div class="page" id="pageServicios">
    <header class="top">
      <div class="brand">
        <div class="mark">L</div>
        <div class="name">LoAn Estética</div>
      </div>
    </header>
    <div class="scroll-area">
      <div class="section-head">
        <h2>Servicios</h2>
        <p>Tocá un servicio para empezar tu reserva</p>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
    </div>
  </div>

  <!-- ══ PÁGINA 2: RESEÑAS ══ -->
  <div class="page out-right" id="pageReseñas">
    <header class="top with-back">
      <button class="back-btn" id="btnVolverResenas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
    </header>
    <div class="scroll-area">
      <div class="review-page-content">
        <div class="review-tagline">
          <h2>¿Cómo fue tu visita?</h2>
          <p>Tu opinión nos ayuda a seguir creciendo</p>
        </div>
        <div class="review-card">
          <div class="stars-row" id="starRating">
            <span data-v="1">★</span>
            <span data-v="2">★</span>
            <span data-v="3">★</span>
            <span data-v="4">★</span>
            <span data-v="5">★</span>
          </div>
          <div class="star-label" id="starLabel"> </div>
          <p class="review-hint">Tocá las estrellas para calificar</p>
          <button class="btn-glass" id="btnEscribir">Escribir comentario</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ PÁGINA 3: HISTORIAL ══ -->
  <div class="page out-right" id="pageHistorial">
    <header class="top with-back">
      <button class="back-btn" id="btnVolverHistorial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
    </header>
    <div class="scroll-area">
      <div style="padding: 0 16px">
        <div class="section-head" style="padding-left:4px;padding-right:4px">
          <h2>Historial</h2>
          <p>Tus consultas y reseñas enviadas</p>
        </div>
        <div class="historial-list" id="historialList"></div>
      </div>
    </div>
  </div>

</div>

<!-- NAV -->
<nav class="bottom">
  <button class="active" id="navServicios">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Servicios
  </button>
  <button id="navResenas">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Reseñas
  </button>
  <button id="navHistorial">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historial
  </button>
</nav>

<!-- MODAL SERVICIO -->
<div class="modal-overlay" id="serviceModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Consultar servicio</h3>
    <button class="modal-btn" id="btnPrecio">
      <span class="modal-btn-icon">💬</span>
      <span class="btn-label">
        <strong>Más información</strong>
        <span>Precio y detalles del servicio</span>
      </span>
    </button>
    <button class="modal-btn" id="btnDisponibilidad">
      <span class="modal-btn-icon">📅</span>
      <span class="btn-label">
        <strong>Consultar horario</strong>
        <span>Ver disponibilidad y reservar</span>
      </span>
    </button>
    <button class="modal-btn-cancel" id="btnCerrarServicio">Cancelar</button>
  </div>
</div>

<!-- MODAL COMENTARIO -->
<div class="modal-float-overlay" id="reviewModal">
  <div class="modal-float">
    <h3>Tu reseña</h3>
    <div class="modal-stars-display" id="modalStarsDisplay">★★★★★</div>
    <textarea class="comment-input" id="commentText" placeholder="Contanos cómo fue tu experiencia…"></textarea>
    <button class="btn-glass" id="btnEnviarWA" style="margin-bottom:10px">Enviar por WhatsApp</button>
    <button class="btn-cancel-flat" id="btnCerrarReview">Cancelar</button>
  </div>
</div>

<!-- app.js externo (Firebase + lógica de servicios) -->
<script src="app.js"></script>

<script>
(function () {
'use strict';

/* ────────────────────────────────────────────
   ILUSTRACIONES — una sola imagen limpia por tarjeta
   (íconos lineales en rosa, sin capas repetidas)
──────────────────────────────────────────── */
var ILLUSTRATIONS = [
  /* flor / facial */
  '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="#D4547A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M50 50c0-12 8-20 8-20s8 8 8 20-8 20-8 20-8-8-8-20z"/><path d="M50 50c0-12-8-20-8-20s-8 8-8 20 8 20 8 20 8-8 8-20z"/><path d="M50 50c12 0 20 8 20 8s-8 8-20 8-20-8-20-8 8-8 20-8z"/><path d="M50 50c12 0 20-8 20-8s-8-8-20-8-20 8-20 8 8 8 20 8z"/><circle cx="50" cy="50" r="6"/></g></svg>',
  /* manos / masaje */
  '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="#D4547A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M30 60c0-16 8-30 20-30s20 14 20 30"/><path d="M22 60h56"/><path d="M30 60v8a8 8 0 0 0 8 8h24a8 8 0 0 0 8-8v-8"/><circle cx="50" cy="30" r="6"/></g></svg>',
  /* gota / hidratación */
  '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="#D4547A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M50 18c12 18 22 32 22 44a22 22 0 1 1-44 0c0-12 10-26 22-44z"/><path d="M40 64a10 10 0 0 0 10 10"/></g></svg>',
  /* estrellas / brillo */
  '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="#D4547A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M50 20l6 16 16 6-16 6-6 16-6-16-16-6 16-6z"/><path d="M76 64l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/><path d="M22 32l2.4 6.4L30 40l-5.6 1.6L22 48l-2.4-6.4L14 40l5.6-1.6z"/></g></svg>',
  /* hoja / spa natural */
  '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="#D4547A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M30 70C30 40 55 22 78 22c0 26-18 50-48 50-8 0-14-2-14-2"/><path d="M30 70c4-14 14-26 30-34"/></g></svg>'
];

function buildCardImage(index) {
  return ILLUSTRATIONS[index % ILLUSTRATIONS.length];
}

/* ── RENDER CARDS (carrusel horizontal) ── */
function buildCard(s, index) {
  var card = document.createElement('div');
  card.className = 'service-card';

  card.innerHTML =
    '<div class="card-bg ' + ('card-bg-' + ((index % 5) + 1)) + '"></div>' +
    '<div class="card-image">' + buildCardImage(index) + '</div>' +
    '<div class="card-overlay"></div>' +
    '<div class="card-body">' +
      '<h3>' + (s.emoji || '') + ' ' + s.nombre + '</h3>' +
      '<div class="card-meta">' +
        '<span class="dur">' + (s.duracion || s.dur || '') + '</span>' +
        '<span class="price-pill">' + (s.precio || '') + '</span>' +
      '</div>' +
    '</div>';

  card.addEventListener('click', function () {
    window._selectedService = s;
    document.getElementById('modalTitle').textContent = s.nombre;
    document.getElementById('serviceModal').classList.add('flex');
  });
  return card;
}

function renderServicios() {
  var grid = document.getElementById('servicesGrid');
  var lista = (Array.isArray(window.SERVICIOS) && window.SERVICIOS.length)
    ? window.SERVICIOS : [];
  grid.innerHTML = '';
  lista.forEach(function (s, i) { grid.appendChild(buildCard(s, i)); });
}

window.__renderServicios = renderServicios;
renderServicios();

/* ── NAVEGACIÓN ── */
var ORDER   = ['pageServicios','pageReseñas','pageHistorial'];
var current = 'pageServicios';

function irA(id) {
  if (id === current) return;
  var fromEl  = document.getElementById(current);
  var toEl    = document.getElementById(id);
  var goRight = ORDER.indexOf(id) > ORDER.indexOf(current);
  fromEl.classList.add(goRight ? 'out-left' : 'out-right');
  toEl.classList.remove('out-left','out-right');
  current = id;
  ['navServicios','navResenas','navHistorial'].forEach(function (n, i) {
    document.getElementById(n).classList.toggle('active', ORDER[i] === id);
  });
  if (id === 'pageHistorial') renderHistorial();
}

document.getElementById('navServicios').addEventListener('click',      function(){ irA('pageServicios'); });
document.getElementById('navResenas').addEventListener('click',        function(){ irA('pageReseñas');   });
document.getElementById('navHistorial').addEventListener('click',      function(){ irA('pageHistorial'); });
document.getElementById('btnVolverResenas').addEventListener('click',  function(){ irA('pageServicios'); });
document.getElementById('btnVolverHistorial').addEventListener('click',function(){ irA('pageServicios'); });

/* ── HISTORIAL ── */
var LS_KEY = 'loan_historial';

function getH()  { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e){ return []; } }

function guardarItem(item) {
  var h = getH();
  item.id    = Date.now();
  item.fecha = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  h.unshift(item);
  localStorage.setItem(LS_KEY, JSON.stringify(h));
}
window.__guardarHistorial = guardarItem;

var ICONOS = { precio:'💬', disponibilidad:'📅', resena:'⭐' };
var TIPOS  = { precio:'Más información', disponibilidad:'Consulta de horario', resena:'Reseña enviada' };

function renderHistorial() {
  var lista = document.getElementById('historialList');
  var h = getH();
  lista.innerHTML = '';
  if (!h.length) {
    lista.innerHTML = '<div class="hist-empty"><div class="empty-icon">🌸</div><p>Todavía no hay nada por aquí.<br>Tus consultas y reseñas aparecerán acá.</p></div>';
    return;
  }
  h.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'hist-card';
    var stars = (item.tipo === 'resena' && item.estrellas)
      ? '<div class="hist-stars">' + '★'.repeat(item.estrellas) + '☆'.repeat(5-item.estrellas) + '</div>' : '';
    var coment = item.comentario
      ? '<div class="hist-comentario">"' + item.comentario + '"</div>' : '';
    card.innerHTML =
      '<div class="hist-icon">' + (ICONOS[item.tipo]||'📋') + '</div>' +
      '<div class="hist-body">' +
        '<div class="hist-tipo">'      + (TIPOS[item.tipo]||item.tipo) + '</div>' +
        '<div class="hist-servicio">'  + (item.servicio||'') + '</div>' +
        stars + coment +
        '<div class="hist-fecha">'     + item.fecha + '</div>' +
      '</div>';
    lista.appendChild(card);
  });
  var btn = document.createElement('button');
  btn.className = 'hist-clear';
  btn.textContent = 'Borrar historial';
  btn.addEventListener('click', function(){
    if (confirm('¿Borrar todo el historial?')){ localStorage.removeItem(LS_KEY); renderHistorial(); }
  });
  lista.appendChild(btn);
}

/* ── ESTRELLAS ── */
var rating    = 5;
var LABELS    = ['','Malo 😕','Regular 😐','Bien 🙂','Muy bien 😊','Excelente ✨'];
var estrellas = document.querySelectorAll('#starRating span');

function pintarEstrellas() {
  estrellas.forEach(function(s){
    var v = parseInt(s.getAttribute('data-v'),10);
    s.classList.toggle('lit',  v <= rating);
    s.classList.toggle('bump', v === rating);
  });
  document.getElementById('starLabel').textContent = LABELS[rating];
  document.getElementById('modalStarsDisplay').textContent = '★'.repeat(rating) + '☆'.repeat(5-rating);
}
estrellas.forEach(function(s){
  s.addEventListener('click', function(e){
    e.preventDefault();
    estrellas.forEach(function(x){ x.classList.remove('bump'); });
    rating = parseInt(s.getAttribute('data-v'),10);
    pintarEstrellas();
  });
  s.addEventListener('touchstart', function(e){ e.stopPropagation(); },{ passive:true });
});
pintarEstrellas();

/* ── MODAL COMENTARIO ── */
document.getElementById('btnEscribir').addEventListener('click', function(){
  document.getElementById('commentText').value = '';
  document.getElementById('reviewModal').classList.add('flex');
});
document.getElementById('btnCerrarReview').addEventListener('click', function(){
  document.getElementById('reviewModal').classList.remove('flex');
});
document.getElementById('reviewModal').addEventListener('click', function(e){
  if (e.target === this) this.classList.remove('flex');
});
document.getElementById('btnEnviarWA').addEventListener('click', function(){
  var texto   = document.getElementById('commentText').value.trim();
  var mensaje = '¡Hola! Quiero dejar una reseña de ' + '⭐'.repeat(rating);
  if (texto) mensaje += '\n\n"' + texto + '"';
  window.open('https://wa.me/541136047671?text=' + encodeURIComponent(mensaje));
  guardarItem({ tipo:'resena', servicio:'Reseña general', estrellas:rating, comentario:texto });
  document.getElementById('reviewModal').classList.remove('flex');
});

/* ── MODAL SERVICIO ── */
document.getElementById('btnCerrarServicio').addEventListener('click', function(){
  document.getElementById('serviceModal').classList.remove('flex');
});
document.getElementById('serviceModal').addEventListener('click', function(e){
  if (e.target === this) this.classList.remove('flex');
});
document.getElementById('btnPrecio').addEventListener('click', function(){
  var s = window._selectedService;
  if (s) guardarItem({ tipo:'precio', servicio:s.nombre });
  if (typeof contactarWhatsApp === 'function') contactarWhatsApp('precio');
  document.getElementById('serviceModal').classList.remove('flex');
});
document.getElementById('btnDisponibilidad').addEventListener('click', function(){
  var s = window._selectedService;
  if (s) guardarItem({ tipo:'disponibilidad', servicio:s.nombre });
  if (typeof contactarWhatsApp === 'function') contactarWhatsApp('disponibilidad');
  document.getElementById('serviceModal').classList.remove('flex');
});

})();
</script>
</body>
</html>
