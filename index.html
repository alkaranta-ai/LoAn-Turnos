<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LoAn Estética | Turnos online — Campana</title>
<meta name="description" content="Reservá tu turno online en LoAn Estética, Campana. Tratamientos faciales, corporales y masajes.">
<meta name="theme-color" content="#C07090">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LoAn">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --tierra-dark: #7A4A5A;
    --tierra: #C07090;
    --sage-dark: #B0527A;
    --texto-claro: #A07080;
    --texto: #4A2A3A;
    --radius: 20px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; height: 100%; }
  body {
    font-family: var(--font-body);
    background: linear-gradient(160deg, #f0c8d8 0%, #fde8f0 45%, #e8c0d0 100%);
    background-attachment: fixed;
    background-color: #f0c8d8;
    color: var(--texto);
    height: 100dvh;
    overflow: hidden;
  }

  #app { position: relative; width: 100%; height: 100dvh; overflow: hidden; }

  /* ── PÁGINAS ── */
  .page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding-bottom: calc(78px + env(safe-area-inset-bottom));
    transition: transform 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.42s ease;
    will-change: transform, opacity;
  }
  .page.out-left  { transform: translateX(-12%) scale(0.96); opacity: 0; pointer-events: none; }
  .page.out-right { transform: translateX(100%);             opacity: 0; pointer-events: none; }

  /* ── HEADER ── */
  header.top {
    position: sticky; top: 0; z-index: 50; flex-shrink: 0;
    padding-top: calc(14px + env(safe-area-inset-top));
    padding-bottom: 14px;
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,248,252,0.30);
    backdrop-filter: blur(32px) saturate(200%);
    -webkit-backdrop-filter: blur(32px) saturate(200%);
    border-bottom: 0.5px solid rgba(255,255,255,0.50);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 16px rgba(160,60,100,0.08);
  }
  header.top.with-back { justify-content: flex-start; gap: 14px; }

  .back-btn {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none; color: var(--sage-dark);
    font-family: var(--font-body); font-size: 1rem; font-weight: 500; cursor: pointer; padding: 4px 0;
  }
  .back-btn svg { width: 20px; height: 20px; }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(192,112,144,0.28);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 0.5px solid rgba(255,255,255,0.65);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    color: var(--tierra-dark); font-family: var(--font-display); font-weight: 600; font-size: 1.3rem;
  }
  .brand .name { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--tierra-dark); }

  /* ── CONTENIDO GENÉRICO ── */
  .page-content {
    flex: 1; padding: 36px max(20px, env(safe-area-inset-left));
    max-width: 760px; margin: 0 auto; width: 100%;
  }
  .section-head { text-align: center; margin-bottom: 28px; }
  .section-head h2 { font-family: var(--font-display); font-size: 2.2rem; color: var(--tierra-dark); margin-bottom: 6px; }
  .section-head p { color: var(--texto-claro); font-size: 0.9rem; }

  /* ── TARJETAS SERVICIOS ── */
  .services-grid { display: flex; flex-direction: column; gap: 12px; }
  .service-card {
    position: relative;
    background: rgba(255,255,255,0.26);
    backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 4px 20px rgba(160,60,100,0.10);
    border-radius: var(--radius); overflow: hidden; min-height: 190px;
    cursor: pointer; transition: transform 0.15s ease;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 18px; color: #fff;
    background-size: cover; background-position: center;
  }
  .service-card:active { transform: scale(0.98); }
  .service-card::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(60,10,30,0.72) 0%, rgba(0,0,0,0.10) 60%, transparent 100%);
    z-index: 1;
  }
  .service-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent); z-index: 3;
  }
  .service-card h3, .service-card .meta { position: relative; z-index: 2; }
  .service-card h3 { font-family: var(--font-display); font-size: 1.25rem; margin: 0 0 6px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .service-card .meta { display: flex; align-items: center; justify-content: space-between; }
  .service-card .meta span { font-size: 0.82rem; opacity: 0.88; }
  .service-card .price {
    background: rgba(255,255,255,0.22); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.40); border-radius: 50px;
    padding: 4px 12px; font-weight: 600; font-size: 0.85rem !important; opacity: 1 !important;
  }

  /* ── RESEÑAS ── */
  .review-page-content {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 36px max(20px, env(safe-area-inset-left)); gap: 24px; text-align: center;
  }
  .review-card {
    background: rgba(255,255,255,0.26);
    backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 4px 20px rgba(160,60,100,0.10);
    border-radius: var(--radius); padding: 32px 24px; width: 100%; max-width: 420px;
  }
  .stars-row {
    display: flex; justify-content: center; gap: 8px;
    font-size: 2.8rem; margin-bottom: 18px; user-select: none;
    -webkit-tap-highlight-color: transparent; outline: none;
  }
  .stars-row span {
    display: inline-block; color: rgba(160,112,130,0.30);
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.15s;
    -webkit-tap-highlight-color: transparent; outline: none; cursor: pointer;
  }
  .stars-row span.lit  { color: #FFD700; }
  .stars-row span.bump { transform: scale(1.22); }
  .star-label { font-family: var(--font-display); font-size: 1.6rem; color: var(--tierra-dark); min-height: 2.2rem; margin-bottom: 6px; }
  .review-hint { font-size: 0.85rem; color: var(--texto-claro); margin-bottom: 22px; }

  /* ── HISTORIAL ── */
  .historial-list { display: flex; flex-direction: column; gap: 12px; }

  .hist-card {
    background: rgba(255,255,255,0.26);
    backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 4px 16px rgba(160,60,100,0.08);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; gap: 14px; align-items: flex-start;
  }

  .hist-icon {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    background: rgba(192,112,144,0.18);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .hist-body { flex: 1; min-width: 0; }
  .hist-tipo {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--sage-dark); margin-bottom: 3px;
  }
  .hist-servicio { font-family: var(--font-display); font-size: 1.05rem; color: var(--tierra-dark); margin-bottom: 4px; line-height: 1.2; }
  .hist-stars { font-size: 0.9rem; color: #FFD700; margin-bottom: 3px; letter-spacing: 2px; }
  .hist-comentario { font-size: 0.8rem; color: var(--texto-claro); font-style: italic; margin-bottom: 4px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-fecha { font-size: 0.72rem; color: var(--texto-claro); }

  .hist-empty {
    text-align: center; padding: 50px 20px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(255,255,255,0.45);
    border-radius: var(--radius);
  }
  .hist-empty .empty-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.5; }
  .hist-empty p { color: var(--texto-claro); font-size: 0.9rem; line-height: 1.5; }

  .hist-clear {
    margin-top: 18px; width: 100%; padding: 12px;
    border-radius: 50px; border: 0.5px solid rgba(192,112,144,0.25);
    background: rgba(255,255,255,0.20); color: var(--texto-claro);
    font-family: var(--font-body); font-size: 0.82rem; cursor: pointer;
    transition: background 0.15s;
  }
  .hist-clear:active { background: rgba(255,255,255,0.35); }

  /* ── BOTÓN GLASS ── */
  .btn-glass {
    width: 100%; padding: 15px; border-radius: 50px;
    background: rgba(176,82,122,0.28);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 2px 8px rgba(160,60,100,0.15);
    color: var(--tierra-dark); font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: transform 0.12s;
  }
  .btn-glass:active { transform: scale(0.97); }

  /* ── NAV BOTTOM ── */
  nav.bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
    background: rgba(255,220,235,0.55);
    backdrop-filter: blur(32px) saturate(200%); -webkit-backdrop-filter: blur(32px) saturate(200%);
    border-top: 0.5px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.60), 0 -2px 12px rgba(160,60,100,0.07);
    display: flex; justify-content: space-around;
    padding: 10px 0 env(safe-area-inset-bottom);
  }
  /* Tapa la franja blanca de safe-area en iOS con el color del fondo */
  nav.bottom::after {
    content: "";
    position: absolute;
    bottom: calc(-1 * env(safe-area-inset-bottom));
    left: 0; right: 0;
    height: env(safe-area-inset-bottom);
    background: #e8c0d0;
  }
  nav.bottom button {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--texto-claro); font-size: 0.65rem; font-family: var(--font-body);
    padding: 6px 14px; border-radius: 14px; transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  nav.bottom button.active { background: rgba(192,112,144,0.18); color: var(--tierra-dark); }
  nav.bottom button svg { width: 22px; height: 22px; }

  /* ── MODALES ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(60,10,30,0.45);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 100; align-items: flex-end; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal-overlay.flex { display: flex; }

  .modal-sheet {
    background: rgba(255,248,252,0.70);
    backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.65);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 -4px 30px rgba(160,60,100,0.18);
    border-radius: 28px 28px 0 0; width: 100%; max-width: 520px; padding: 10px 20px 28px;
    animation: sheetUp 0.3s cubic-bezier(0.34,1.1,0.64,1);
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: rgba(160,112,130,0.35); border-radius: 2px; margin: 0 auto 18px; }
  .modal-sheet h3 { font-family: var(--font-display); color: var(--tierra-dark); font-size: 1.5rem; margin-bottom: 18px; text-align: center; }
  .modal-btn {
    width: 100%; margin-bottom: 10px; padding: 15px; border-radius: 16px;
    cursor: pointer; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
    border: 0.5px solid rgba(255,255,255,0.5); transition: transform 0.12s;
  }
  .modal-btn:active { transform: scale(0.98); }
  .modal-btn-primary {
    background: rgba(176,82,122,0.28); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    color: var(--tierra-dark); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .modal-btn-cancel {
    background: rgba(255,255,255,0.35); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    color: var(--texto-claro); box-shadow: inset 0 1px 0 rgba(255,255,255,0.55); margin-bottom: 0;
  }

  .modal-float-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(60,10,30,0.45);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-float-overlay.flex { display: flex; }
  .modal-float {
    background: rgba(255,248,252,0.72);
    backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.70);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.80), 0 20px 60px rgba(160,60,100,0.22);
    border-radius: 28px; width: 100%; max-width: 420px; padding: 28px 22px;
    animation: floatIn 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes floatIn { from { transform: scale(0.92) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .modal-float h3 { font-family: var(--font-display); color: var(--tierra-dark); font-size: 1.5rem; margin-bottom: 4px; text-align: center; }
  .modal-stars-display { font-size: 1.4rem; text-align: center; margin-bottom: 18px; letter-spacing: 4px; color: #FFD700; }
  .comment-input {
    width: 100%; padding: 14px 16px; border-radius: 16px;
    border: 0.5px solid rgba(192,112,144,0.30);
    background: rgba(255,255,255,0.40);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    font-family: var(--font-body); font-size: 0.92rem; color: var(--texto);
    resize: none; outline: none; transition: border-color 0.2s;
    margin-bottom: 14px; min-height: 110px;
  }
  .comment-input:focus { border-color: rgba(192,112,144,0.60); }
  .comment-input::placeholder { color: var(--texto-claro); }
  .btn-cancel-flat {
    width: 100%; padding: 12px; border-radius: 50px;
    background: rgba(255,255,255,0.35); border: 0.5px solid rgba(255,255,255,0.5);
    color: var(--texto-claro); font-family: var(--font-body); font-weight: 500; cursor: pointer; margin-top: 2px;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ══ PÁGINA 1: SERVICIOS ══ -->
  <div class="page" id="pageServicios">
    <header class="top">
      <div class="brand">
        <div class="mark">L</div>
        <div class="name">LoAn Estética</div>
      </div>
    </header>
    <div class="page-content">
      <div class="section-head">
        <h2>Servicios</h2>
        <p>Tocá un servicio para empezar tu reserva</p>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
    </div>
  </div>

  <!-- ══ PÁGINA 2: RESEÑAS ══ -->
  <div class="page out-right" id="pageReseñas">
    <header class="top with-back">
      <button class="back-btn" id="btnVolverResenas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
    </header>
    <div class="review-page-content">
      <div>
        <h2 style="font-family:var(--font-display);font-size:2.4rem;color:var(--tierra-dark);margin-bottom:8px;">¿Cómo fue tu visita?</h2>
        <p style="font-size:0.88rem;color:var(--texto-claro);">Tu opinión nos ayuda a seguir creciendo</p>
      </div>
      <div class="review-card">
        <div class="stars-row" id="starRating">
          <span data-v="1">★</span>
          <span data-v="2">★</span>
          <span data-v="3">★</span>
          <span data-v="4">★</span>
          <span data-v="5">★</span>
        </div>
        <div class="star-label" id="starLabel"> </div>
        <p class="review-hint">Tocá las estrellas para calificar</p>
        <button class="btn-glass" id="btnEscribir">Escribir comentario</button>
      </div>
    </div>
  </div>

  <!-- ══ PÁGINA 3: HISTORIAL ══ -->
  <div class="page out-right" id="pageHistorial">
    <header class="top with-back">
      <button class="back-btn" id="btnVolverHistorial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
    </header>
    <div class="page-content">
      <div class="section-head">
        <h2>Mi Historial</h2>
        <p>Tus consultas y reseñas enviadas</p>
      </div>
      <div class="historial-list" id="historialList"></div>
    </div>
  </div>

</div>

<!-- ── NAV BOTTOM ── -->
<nav class="bottom">
  <button class="active" id="navServicios">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Servicios
  </button>
  <button id="navResenas">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Reseñas
  </button>
  <button id="navHistorial">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historial
  </button>
</nav>

<!-- ── MODAL SERVICIO ── -->
<div class="modal-overlay" id="serviceModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Consultar servicio</h3>
    <button class="modal-btn modal-btn-primary" id="btnPrecio">💬 Más información</button>
    <button class="modal-btn modal-btn-primary" id="btnDisponibilidad">📅 Consultar día y horario</button>
    <button class="modal-btn modal-btn-cancel" id="btnCerrarServicio">Cancelar</button>
  </div>
</div>

<!-- ── MODAL COMENTARIO ── -->
<div class="modal-float-overlay" id="reviewModal">
  <div class="modal-float">
    <h3>Tu reseña</h3>
    <div class="modal-stars-display" id="modalStarsDisplay">★★★★★</div>
    <textarea class="comment-input" id="commentText" placeholder="Contanos cómo fue tu experiencia..."></textarea>
    <button class="btn-glass" id="btnEnviarWA" style="margin-bottom:10px;">Enviar por WhatsApp</button>
    <button class="btn-cancel-flat" id="btnCerrarReview">Cancelar</button>
  </div>
</div>

<script src="app.js"></script>
<script>
(function () {

  // ══════════════════════════════════════════
  // NAVEGACIÓN
  // ══════════════════════════════════════════
  var ORDER = ['pageServicios', 'pageReseñas', 'pageHistorial'];
  var current = 'pageServicios';

  function irA(id) {
    if (id === current) return;
    var fromEl = document.getElementById(current);
    var toEl   = document.getElementById(id);
    var fromIdx = ORDER.indexOf(current);
    var toIdx   = ORDER.indexOf(id);
    var goRight = toIdx > fromIdx;

    fromEl.classList.add(goRight ? 'out-left' : 'out-right');
    toEl.classList.remove('out-left', 'out-right');
    current = id;

    // Nav activo
    ['navServicios','navResenas','navHistorial'].forEach(function(n, i) {
      document.getElementById(n).classList.toggle('active', ORDER[i] === id);
    });

    // Renderizar historial al entrar
    if (id === 'pageHistorial') renderHistorial();
  }

  document.getElementById('navServicios').addEventListener('click',   function(){ irA('pageServicios');  });
  document.getElementById('navResenas').addEventListener('click',     function(){ irA('pageReseñas');    });
  document.getElementById('navHistorial').addEventListener('click',   function(){ irA('pageHistorial');  });
  document.getElementById('btnVolverResenas').addEventListener('click',   function(){ irA('pageServicios'); });
  document.getElementById('btnVolverHistorial').addEventListener('click',  function(){ irA('pageServicios'); });

  // ══════════════════════════════════════════
  // HISTORIAL — localStorage
  // ══════════════════════════════════════════
  var LS_KEY = 'loan_historial';

  function getHistorial() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }

  function guardarItem(item) {
    var h = getHistorial();
    item.id   = Date.now();
    item.fecha = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    h.unshift(item); // más nuevo arriba
    localStorage.setItem(LS_KEY, JSON.stringify(h));
  }

  var ICONOS = { precio: '💬', disponibilidad: '📅', resena: '⭐' };
  var TIPOS  = { precio: 'Más información', disponibilidad: 'Consulta de horario', resena: 'Reseña enviada' };

  function renderHistorial() {
    var lista = document.getElementById('historialList');
    var h = getHistorial();
    lista.innerHTML = '';

    if (!h.length) {
      lista.innerHTML = '<div class="hist-empty"><div class="empty-icon">🌸</div><p>Todavía no hay nada por aquí.<br>Tus consultas y reseñas aparecerán acá.</p></div>';
      return;
    }

    h.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'hist-card';

      var starsHtml = '';
      if (item.tipo === 'resena' && item.estrellas) {
        starsHtml = '<div class="hist-stars">' + '★'.repeat(item.estrellas) + '☆'.repeat(5 - item.estrellas) + '</div>';
      }
      var comentHtml = '';
      if (item.comentario) {
        comentHtml = '<div class="hist-comentario">"' + item.comentario + '"</div>';
      }

      card.innerHTML =
        '<div class="hist-icon">' + (ICONOS[item.tipo] || '📋') + '</div>' +
        '<div class="hist-body">' +
          '<div class="hist-tipo">' + (TIPOS[item.tipo] || item.tipo) + '</div>' +
          '<div class="hist-servicio">' + (item.servicio || '') + '</div>' +
          starsHtml + comentHtml +
          '<div class="hist-fecha">' + item.fecha + '</div>' +
        '</div>';
      lista.appendChild(card);
    });

    // Botón limpiar
    var btnLimpiar = document.createElement('button');
    btnLimpiar.className = 'hist-clear';
    btnLimpiar.textContent = 'Borrar historial';
    btnLimpiar.addEventListener('click', function() {
      if (confirm('¿Borrar todo el historial?')) {
        localStorage.removeItem(LS_KEY);
        renderHistorial();
      }
    });
    lista.appendChild(btnLimpiar);
  }

  // ══════════════════════════════════════════
  // ESTRELLAS
  // ══════════════════════════════════════════
  var rating = 5;
  var LABELS = ['','Malo 😕','Regular 😐','Bien 🙂','Muy bien 😊','Excelente ✨'];
  var estrellas = document.querySelectorAll('#starRating span');

  function pintarEstrellas() {
    estrellas.forEach(function(s) {
      var v = parseInt(s.getAttribute('data-v'));
      s.classList.toggle('lit',  v <= rating);
      s.classList.toggle('bump', v === rating);
    });
    document.getElementById('starLabel').textContent = LABELS[rating];
    document.getElementById('modalStarsDisplay').textContent = '★'.repeat(rating) + '☆'.repeat(5 - rating);
  }

  estrellas.forEach(function(s) {
    s.addEventListener('click', function(e) {
      e.preventDefault();
      estrellas.forEach(function(x){ x.classList.remove('bump'); });
      rating = parseInt(s.getAttribute('data-v'));
      pintarEstrellas();
    });
    s.addEventListener('touchstart', function(e){ e.stopPropagation(); }, { passive: true });
  });

  pintarEstrellas();

  // ══════════════════════════════════════════
  // MODAL COMENTARIO
  // ══════════════════════════════════════════
  document.getElementById('btnEscribir').addEventListener('click', function() {
    document.getElementById('commentText').value = '';
    document.getElementById('reviewModal').classList.add('flex');
  });

  document.getElementById('btnCerrarReview').addEventListener('click', function() {
    document.getElementById('reviewModal').classList.remove('flex');
  });

  document.getElementById('reviewModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('flex');
  });

  document.getElementById('btnEnviarWA').addEventListener('click', function() {
    var emoji   = '⭐'.repeat(rating);
    var texto   = document.getElementById('commentText').value.trim();
    var mensaje = '¡Hola! Quiero dejar una reseña de ' + emoji;
    if (texto) mensaje += '\n\n"' + texto + '"';
    window.open('https://wa.me/541136047671?text=' + encodeURIComponent(mensaje));

    // Guardar en historial
    guardarItem({ tipo: 'resena', servicio: 'Reseña general', estrellas: rating, comentario: texto });

    document.getElementById('reviewModal').classList.remove('flex');
  });

  // ══════════════════════════════════════════
  // MODAL SERVICIO
  // ══════════════════════════════════════════
  document.getElementById('btnCerrarServicio').addEventListener('click', function() {
    document.getElementById('serviceModal').classList.remove('flex');
  });

  document.getElementById('serviceModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('flex');
  });

  document.getElementById('btnPrecio').addEventListener('click', function() {
    if (typeof contactarWhatsApp === 'function') contactarWhatsApp('precio');
  });

  document.getElementById('btnDisponibilidad').addEventListener('click', function() {
    if (typeof contactarWhatsApp === 'function') contactarWhatsApp('disponibilidad');
  });

  // ══════════════════════════════════════════
  // HOOK en app.js — interceptar contactarWhatsApp
  // para guardar en historial automáticamente
  // ══════════════════════════════════════════
  window.__guardarHistorial = guardarItem;

})();
</script>
</body>
</html>
