<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LoAn Estética | Turnos online — Campana</title>
<meta name="description" content="Reservá tu turno online en LoAn Estética, Campana. Tratamientos faciales, corporales y masajes.">
<meta name="theme-color" content="#C07090">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LoAn">
<style>
  :root { 
    --crema:#FDF0F5; --arena:#F5D0DE; --sage:#D48FAA; --sage-dark:#B0527A; 
    --tierra:#C07090; --tierra-dark:#7A4A5A; --texto:#4A2A3A; --texto-claro:#A07080; 
    --blanco:#FFFAFC; --radius:18px; --shadow: 0 8px 24px rgba(180,80,120,0.10); 
    --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'Inter', system-ui, -apple-system, sans-serif; 
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{ font-family: var(--font-body); background: var(--crema); color: var(--texto); padding-bottom: 78px; }
  
  /* Estilo corregido para las tarjetas con imágenes */
  .services-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:14px; }
  .service-card {
    position: relative;
    background-size: cover;
    background-position: center;
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 200px;
    overflow: hidden;
    color: #fff;
    cursor: pointer;
    transition: transform .15s ease;
  }
  .service-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    pointer-events: none;
  }
  .service-card h3, .service-card .meta { position: relative; z-index: 1; }
  .service-card h3 { font-family: var(--font-display); font-size: 1.2rem; margin: 0; }
  .service-card .price { font-weight: 700; color: #fff; }
  .service-card .icon { display: none; }
  .service-card.selected { outline: 4px solid var(--sage-dark); }

  /* Resto del diseño (Header, secciones, etc) */
  header.top{ position:sticky; top:0; z-index:50; background: rgba(246,241,231,0.92); backdrop-filter: blur(10px); border-bottom:1px solid rgba(192,112,144,0.12); padding: 14px 20px; display:flex; align-items:center; justify-content:space-between; }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{ width:38px; height:38px; border-radius:50%; background: linear-gradient(135deg, var(--sage), var(--tierra)); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); font-weight:600; font-size:1.3rem; }
  .brand .name{ font-family: var(--font-display); font-size:1.5rem; font-weight:600; color: var(--tierra-dark); }
  
  .btn{ display:inline-flex; align-items:center; gap:8px; padding: 14px 26px; border-radius: 999px; font-weight:600; text-decoration:none; border:none; cursor:pointer; }
  .btn-primary{ background: var(--sage-dark); color:#fff; }
  .btn-ghost{ background: var(--blanco); color: var(--tierra-dark); border:1px solid rgba(192,112,144,0.2); }
  
  section{ padding: 56px 20px; max-width: 760px; margin: 0 auto; }
  .section-head{ text-align:center; margin-bottom:32px; }
  .section-head h2{ font-family: var(--font-display); font-size: 2.4rem; color: var(--tierra-dark); }
  
  .booking-card{ background: var(--blanco); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-weight:600; color:var(--tierra-dark); margin-bottom:8px; }
  .field input, .field select, .field textarea{ width:100%; padding: 12px; border-radius:12px; border:1px solid rgba(192,112,144,0.22); background: var(--crema); }
  
  nav.bottom{ position:fixed; bottom:0; left:0; right:0; z-index:60; background: rgba(255,254,252,0.97); backdrop-filter: blur(10px); border-top:1px solid rgba(192,112,144,0.12); display:flex; justify-content:space-around; padding: 10px; }
  nav.bottom a{ display:flex; flex-direction:column; align-items:center; text-decoration:none; color:var(--texto-claro); font-size:0.7rem; }
</style>
</head>
<body>

<header class="top" style="justify-content: center;">
  <div class="brand">
    <div class="mark">L</div>
    <div class="name">LoAn Estética</div>
  </div>
</header>

<section id="servicios">
  <div class="section-head">
    <h2>Servicios</h2>
    <p>Tocá un servicio para empezar tu reserva</p>
  </div>
  <div class="services-grid" id="servicesGrid"></div>
</section>

<section id="calificaciones" style="text-align: center;">
  <div class="section-head">
    <h2>¿Qué te pareció tu visita?</h2>
    <p>Tu opinión nos ayuda a seguir creciendo</p>
  </div>
  
  <div class="booking-card" style="max-width: 450px; margin: 0 auto; padding: 30px 20px;">
    <!-- Contenedor de estrellas interactivas -->
    <div id="starRating" style="font-size: 2.5rem; margin-bottom: 15px; cursor: pointer; display: inline-block; user-select: none;">
      <span data-value="1" style="color: #D48FAA; transition: color 0.2s;">★</span>
      <span data-value="2" style="color: #D48FAA; transition: color 0.2s;">★</span>
      <span data-value="3" style="color: #D48FAA; transition: color 0.2s;">★</span>
      <span data-value="4" style="color: #D48FAA; transition: color 0.2s;">★</span>
      <span data-value="5" style="color: #D48FAA; transition: color 0.2s;">★</span>
    </div>
    
    <h3 style="font-family: var(--font-display); color: var(--tierra-dark); margin-bottom: 10px; font-size: 1.4rem;">Dejanos tu reseña</h3>
    <p style="font-size: 0.9rem; color: var(--texto-claro); margin-bottom: 25px;">Seleccioná las estrellas y compartí tu experiencia con nosotros.</p>
    
    <button onclick="enviarCalificacion()" class="btn btn-primary" style="width: 100%; justify-content: center; border: none; font-size: 1rem; cursor: pointer;">
       Calificar o dejar comentario
    </button>
  </div>
</section>

<script src="app.js"></script>
  <div id="serviceModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;">
  <div style="background:white; padding:25px; border-radius:20px; width:90%; max-width:400px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
    <h3 id="modalTitle" style="color:#7A4A5A; margin-bottom:15px;">Consultar servicio</h3>
    <button onclick="contactarWhatsApp('precio')" style="width:100%; margin-bottom:10px; padding:12px; background:#B0527A; color:white; border:none; border-radius:10px; cursor:pointer;">Preguntar precio</button>
    <button onclick="contactarWhatsApp('disponibilidad')" style="width:100%; margin-bottom:10px; padding:12px; background:#B0527A; color:white; border:none; border-radius:10px; cursor:pointer;">Consultar día y horario</button>
    <button onclick="document.getElementById('serviceModal').style.display='none'" style="width:100%; padding:12px; background:#f0f0f0; border:none; border-radius:10px; cursor:pointer;">Cancelar</button>
  </div>
</div>
</body>
</html>
