<!-- Pegar esto dentro del <head> de tu index.html, junto a las otras meta tags -->

<!-- Open Graph: así se ve la tarjeta al compartir en WhatsApp, Instagram, etc -->
<meta property="og:title" content="LoAn Estética">
<meta property="og:description" content="Reservá tu turno online en LoAn Estética, Campana.">
<meta property="og:image" content="https://alkaranta-ai.github.io/LoAn-Turnos/og-image.png">
<meta property="og:url" content="https://alkaranta-ai.github.io/LoAn-Turnos/">
<meta property="og:type" content="website">

<!-- Twitter/X usa estas, conviene tenerlas también -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="LoAn Estética">
<meta name="twitter:description" content="Reservá tu turno online en LoAn Estética, Campana.">
<meta name="twitter:image" content="https://alkaranta-ai.github.io/LoAn-Turnos/og-image.png">
